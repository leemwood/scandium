name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk &> /dev/null; then
            echo "Downloading cargo-ndk..."
            # 使用更稳健的下载方式，如果下载失败则回退到 cargo install
            curl -LsSf https://github.com/bbqsrc/cargo-ndk/releases/download/v3.6.3/cargo-ndk-v3.6.3-x86_64-unknown-linux-gnu.tar.gz -o cargo-ndk.tar.gz || \
            curl -LsSf https://github.com/bbqsrc/cargo-ndk/releases/download/v3.6.3/cargo-ndk-v3.6.3-x86_64-unknown-linux-musl.tar.gz -o cargo-ndk.tar.gz
            
            if [ -f cargo-ndk.tar.gz ]; then
              tar xzf cargo-ndk.tar.gz -C ~/.cargo/bin
              rm cargo-ndk.tar.gz
            else
              echo "Binary download failed, falling back to cargo install..."
              cargo install cargo-ndk --version 3.6.3
            fi
          fi

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27b

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/main/rust

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -PincludeAndroid
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/libs/*.jar
          generate_release_notes: true
          draft: false
          prerelease: contains(github.ref, 'beta') || contains(github.ref, 'alpha')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
